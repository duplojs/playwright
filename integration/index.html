<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Integration playground</title>
		<style>
			:root {
				font-family: sans-serif;
			}

			body {
				margin: 0;
				padding: 32px;
				background: #f5f5f5;
				color: #111;
			}

			main {
				max-width: 720px;
				margin: 0 auto;
				padding: 24px;
				background: #fff;
				border: 1px solid #ddd;
			}

			form {
				display: grid;
				gap: 12px;
				margin-top: 16px;
			}

			input,
			button {
				padding: 10px 12px;
			}
		</style>
	</head>
	<body>
		<main data-page="home">
			<header>
				<p aria-hydrated="true">Hydrated</p>
				<h1>Bienvenue sur le site de demo</h1>
				<p>Une page toute simple pour tester la lib en integration.</p>
			</header>

			<section data-newsletter>
				<h2>Newsletter</h2>
				<p data-feedback>Aucun email enregistre.</p>

				<form>
					<label for="email">Email</label>
					<input id="email" name="email" type="email" placeholder="john@doe.dev" />
					<button type="button" data-submit aria-busy="false">Valider</button>
				</form>
			</section>
		</main>

		<script>
			const emailInput = document.querySelector("#email");
			const submitButton = document.querySelector("[data-submit]");
			const feedback = document.querySelector("[data-feedback]");

			submitButton?.addEventListener("click", () => {
				submitButton.setAttribute("aria-busy", "true");

				if (!emailInput?.value) {
					feedback.textContent = "Email requis.";
					submitButton.setAttribute("aria-busy", "false");
					return;
				}

				feedback.textContent = "Inscription en cours...";

				window.setTimeout(() => {
					feedback.textContent = `Inscription confirmee pour ${emailInput.value}`;
					submitButton.setAttribute("aria-busy", "false");
				}, 50);
			});
		</script>
	</body>
</html>
