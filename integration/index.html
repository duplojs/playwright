<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Integration playground</title>
		<style>
			:root {
				font-family: sans-serif;
			}

			body {
				margin: 0;
				padding: 32px;
				background: #f5f5f5;
				color: #111;
			}

			main {
				max-width: 720px;
				margin: 0 auto;
				padding: 24px;
				background: #fff;
				border: 1px solid #ddd;
			}

			form {
				display: grid;
				gap: 12px;
				margin-top: 16px;
			}

			input,
			button {
				padding: 10px 12px;
			}
		</style>
	</head>
	<body>
		<main data-page="home">
			<header>
				<p aria-hydrated="true">Hydrated</p>
				<h1>Welcome to the demo site</h1>
				<p>A simple page used to test the library in integration.</p>
			</header>

			<section data-newsletter>
				<h2>Newsletter</h2>
				<p data-feedback>No email submitted yet.</p>

				<form>
					<label for="email">Email</label>
					<input id="email" name="email" type="email" placeholder="john@doe.dev" />
					<button type="button" data-submit aria-busy="false">Submit</button>
				</form>
			</section>
		</main>

		<script>
			const emailInput = document.querySelector("#email");
			const submitButton = document.querySelector("[data-submit]");
			const feedback = document.querySelector("[data-feedback]");

			submitButton?.addEventListener("click", () => {
				submitButton.setAttribute("aria-busy", "true");

				if (!emailInput?.value) {
					feedback.textContent = "Email is required.";
					submitButton.setAttribute("aria-busy", "false");
					return;
				}

				feedback.textContent = "Submitting subscription...";

				window.setTimeout(() => {
					feedback.textContent = `Subscription confirmed for ${emailInput.value}`;
					submitButton.setAttribute("aria-busy", "false");
				}, 50);
			});
		</script>
	</body>
</html>
